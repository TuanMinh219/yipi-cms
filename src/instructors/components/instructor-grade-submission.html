<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Submissions | Instructor LCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --dark-bg: #f8fafc;
            --border-light: #e2e8f0;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .page-header {
            background: white;
            border-bottom: 1px solid var(--border-light);
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .submission-info {
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-item label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .info-item span {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .score-badge {
            background: var(--primary-blue);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.25rem;
            display: inline-block;
        }

        .question-card {
            background: white;
            border-radius: 0.75rem;
            border: 1px solid var(--border-light);
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
        }

        .question-card:hover {
            border-color: var(--primary-blue);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .question-number {
            display: inline-flex;
            background: var(--primary-blue);
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .answer-section {
            background: #f1f5f9;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-blue);
        }

        .answer-section label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.025em;
            display: block;
            margin-bottom: 0.75rem;
        }

        .answer-section p {
            color: var(--text-dark);
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }

        .grading-section {
            background: #fafbfc;
            border-radius: 0.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border-light);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.95rem;
        }

        .points-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .points-input-group input {
            flex: 0 0 100px;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 0.375rem;
            font-size: 1rem;
        }

        .points-input-group input:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .points-input-group span {
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-check {
            padding-left: 0;
            margin-bottom: 1rem;
        }

        .form-check input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.75rem;
            cursor: pointer;
            accent-color: var(--primary-blue);
        }

        .form-check label {
            font-weight: 500;
            cursor: pointer;
            margin: 0;
            display: flex;
            align-items: center;
        }

        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 0.375rem;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-light);
        }

        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.75rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background-color: white;
            color: var(--text-dark);
            border: 1px solid var(--border-light);
        }

        .btn-secondary:hover {
            background-color: var(--dark-bg);
            border-color: var(--text-muted);
            color: var(--text-dark);
        }

        .no-questions {
            background: white;
            border-radius: 0.75rem;
            padding: 3rem;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .no-questions p {
            color: var(--text-muted);
            font-size: 1.125rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.5rem;
            }

            .submission-info {
                grid-template-columns: 1fr;
            }

            .question-card {
                padding: 1.5rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="page-header">
    <div class="container">
        <h1>Grade Short Answer Questions</h1>
    </div>
</div>

<div class="container">
    <!-- Submission Info -->
    <div class="submission-info">
        <div class="info-item">
            <label>Student</label>
            <span th:text="${submission.student.first_name + ' ' + submission.student.last_name}">Student Name</span>
        </div>
        <div class="info-item">
            <label>Test</label>
            <span th:text="${submission.test.title}">Test Title</span>
        </div>
        <div class="info-item">
            <label>Current Score</label>
            <span class="score-badge" th:text="${submission.score != null ? submission.score : '0'} + '/' + ${submission.test.totalPoints}">0/100</span>
        </div>
    </div>

    <!-- Grade Form -->
    <form th:action="@{/instructor/tests/submissions/{id}/grade-all(id=${submission.submissionId})}"
          method="post"
          th:if="${shortAnswers != null and !shortAnswers.isEmpty()}">

        <!-- Questions from Database -->
        <div th:each="answer, iterStat : ${shortAnswers}" class="question-card">
            <div class="question-number" th:text="${iterStat.count}">1</div>
            <div class="question-text" th:text="${answer.question.questionText}">Question text</div>

            <div class="answer-section">
                <label>Student Answer</label>
                <p th:text="${answer.answerText != null ? answer.answerText : 'No answer provided'}">Answer text</p>
            </div>

            <div class="grading-section">
                <div class="form-group">
                    <label th:for="'points_' + ${answer.question.questionId}">Points Earned</label>
                    <div class="points-input-group">
                        <input type="number"
                               th:id="'points_' + ${answer.question.questionId}"
                               th:name="'points_' + ${answer.question.questionId}"
                               th:value="${answer.pointsEarned != null ? answer.pointsEarned : 0}"
                               min="0"
                               th:max="${answer.question.points}"
                               required>
                        <span th:text="'/ ' + ${answer.question.points}">/ 10</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox"
                               th:id="'correct_' + ${answer.question.questionId}"
                               th:name="'correct_' + ${answer.question.questionId}"
                               th:checked="${answer.isCorrect}"
                               value="true">
                        <label th:for="'correct_' + ${answer.question.questionId}">Mark as Correct</label>
                    </div>
                </div>

                <div class="form-group">
                    <label th:for="'feedback_' + ${answer.question.questionId}">Feedback (optional)</label>
                    <textarea th:id="'feedback_' + ${answer.question.questionId}"
                              th:name="'feedback_' + ${answer.question.questionId}"
                              placeholder="Enter your feedback for the student..."
                              th:text="${answer.feedback}"></textarea>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary">Save Grades</button>
            <a th:href="@{/instructor/tests/{id}/submissions(id=${submission.test.testId})}"
               class="btn-secondary">Cancel</a>
        </div>
    </form>

    <!-- No Questions Message -->
    <div th:if="${shortAnswers == null or shortAnswers.isEmpty()}" class="no-questions">
        <p>No short answer questions found for this submission.</p>
        <div class="button-group" style="border-top: none; justify-content: center;">
            <a th:href="@{/instructor/tests/{id}/submissions(id=${submission.test.testId})}"
               class="btn-secondary">Back to Submissions</a>
        </div>
    </div>
</div>

<script>
    // Update score dynamically when points change
    document.addEventListener('DOMContentLoaded', function() {
        const pointsInputs = document.querySelectorAll('.points-input');
        const scoreBadge = document.querySelector('.score-badge');

        if (pointsInputs.length > 0 && scoreBadge) {
            pointsInputs.forEach(input => {
                input.addEventListener('input', updateScore);
            });
        }

        function updateScore() {
            let totalPoints = 0;
            let maxPoints = 0;

            pointsInputs.forEach(input => {
                const value = parseInt(input.value) || 0;
                const max = parseInt(input.max) || 0;
                totalPoints += value;
                maxPoints += max;
            });

            scoreBadge.textContent = `${totalPoints}/${maxPoints}`;
        }
    });
</script>
</body>
</html>
