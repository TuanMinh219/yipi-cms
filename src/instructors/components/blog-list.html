<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Blogs | Instructor LCMS</title>
    <link rel="stylesheet" th:href="@{/css/instructor/instructor-dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: "Inter", sans-serif; }
        .blogs-wrapper {
            padding: 2rem;
        }
        .page-header {
            background: linear-gradient(120deg, #11998e, #38ef7d);
            color: #fff;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(251, 146, 60, 0.3);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }
        .page-header .text-block {
            max-width: 540px;
        }
        .page-header .subtitle {
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }
        .page-header h1 {
            font-size: 2.3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .cta-button {
            background: #fff;
            color: #11998e;
            border-radius: 12px;
            padding: 0.85rem 1.75rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.25);
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
            background: #fff;
        }
        .status-pill {
            padding: 0.25rem 0.85rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-pill.draft { background: #e0e7ff; color: #312e81; }
        .status-pill.published { background: #dcfce7; color: #166534; }
        table {
            width: 100%;
        }
        table thead {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        table td, table th {
            padding: 1rem 1.25rem;
            vertical-align: middle;
        }
        table tbody tr td:first-child {
            font-weight: 600;
            color: #1f2937;
        }
        table tbody tr.empty-row td {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #6b7280;
            font-weight: 500;
        }
        .ins-alert {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            margin-top: 15px;
            font-weight: 500;
        }
        .ins-alert i {
            font-size: 1.1rem;
        }
        .ins-alert.success {
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }
        .ins-alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .action-buttons {
            display: inline-flex;
            gap: 0.4rem;
        }
        .btn-outline-danger {
            border-color: #f87171;
            color: #dc2626;
        }
        .btn-outline-danger:hover {
            background: #fee2e2;
            border-color: #dc2626;
        }
    </style>
</head>
<body>
<div class="instructor-layout">
    <aside th:replace="~{fragments/instructor/_instructor-nav :: sidebar(currentPage='blogs')}"></aside>

    <div class="main-content">
        <header th:replace="~{fragments/instructor/_instructor-nav :: topbar(pageTitle='Blog Manager')}"></header>

        <main class="dashboard-content blogs-wrapper">
            <section class="page-header mb-4">
                <div class="text-block">
                    <p class="subtitle">Instructor dashboard</p>
                    <h1>Manage Your Blog Posts</h1>
                    <p class="mb-0">Create short articles to guide your students.</p>
                </div>
                <a class="cta-button" th:href="@{/instructor/blogs/create}">
                    <i class="fa-solid fa-plus me-2"></i>Create new blog
                </a>
            </section>

            <div th:if="${success}" class="ins-alert success">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="ins-alert error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="card border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Published at</th>
                                <th>Slug</th>
                                <th class="text-end">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="blog : ${blogs}">
                                <td>
                                    <span class="fw-semibold" th:text="${blog.title}">Sample title</span>
                                </td>
                                <td>
                                    <form th:action="@{'/instructor/blogs/' + ${blog.id} + '/status'}"
                                          method="post" style="margin: 0;">
                                        <select name="status"
                                                class="form-select form-select-sm status-pill"
                                                th:classappend="${blog.status.name() == 'PUBLISHED'} ? ' published' : ' draft'"
                                                style="display: inline-block; width: auto; min-width: 140px; border-radius: 999px; border: none; text-transform: uppercase; font-weight: 700; font-size: 0.8rem; text-align: center"
                                                onchange="this.form.submit()">
                                            <option th:value="DRAFT"
                                                    th:selected="${blog.status.name() == 'DRAFT'}">
                                                Draft
                                            </option>
                                            <option th:value="PUBLISHED"
                                                    th:selected="${blog.status.name() == 'PUBLISHED'}">
                                                Published
                                            </option>
                                        </select>
                                    </form>
                                </td>
                                <td th:text="${blog.publishedAt != null ? #temporals.format(blog.publishedAt, 'HH:mm dd/MM/yyyy') : 'Not published yet'}">—</td>
                                <td>
                                    <a th:href="@{'/blog/' + ${blog.slug}}" target="_blank" th:text="${blog.slug}">blog-slug</a>
                                </td>
                                <td class="text-end">
                                    <div class="action-buttons">
                                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/instructor/blogs/' + ${blog.id} + '/edit'}">
                                            <i class="fa-solid fa-pen me-1"></i>Edit
                                        </a>
                                        <form th:action="@{'/instructor/blogs/' + ${blog.id} + '/delete'}" method="post" class="d-inline">
                                            <button class="btn btn-sm btn-outline-danger" type="submit" onclick="return confirm('Are you sure you want to delete this blog?')">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${blogs == null || #lists.isEmpty(blogs)}" class="empty-row">
                                <td colspan="5">No blog posts yet. Create your first article!</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{fragments/instructor/_instructor-nav :: nav-script}"></div>
</body>
</html>
