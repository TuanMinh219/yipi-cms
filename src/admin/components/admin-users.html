<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Admin LCMS</title>

    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>.topbar-right { position: relative; }</style>

    <style>
        .status-active {
            color: #28a745;
            font-weight: 600;
        }

        .status-inactive {
            color: #fd7e14;
            font-weight: 600;
        }

        .btn-toggle {
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .btn-activate {
            background: #28a745;
        }
        .btn-activate:hover {
            background: #218838;
        }

        .btn-deactivate {
            background: #fd7e14;
        }
        .btn-deactivate:hover {
            background: #e66900;
        }

        /* Make content inside dashboard layout look clean */
        .content-area {
            padding: 30px;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .user-table th, .user-table td {
            text-align: left;
            padding: 12px 10px;
        }
        
        .user-table th:first-child,
        .user-table td:first-child {
            padding-left: 16px;
        }
        
        .user-table th:last-child,
        .user-table td:last-child {
            padding-right: 16px;
        }

        .user-table th {
            background-color: #007bff;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .user-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .user-table tr:hover {
            background-color: #e9ecef;
        }

        /* Remove underline for all action links */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;           /* Cho phép xuống dòng */
            gap: 6px;
            align-items: center;
            max-width: 328px;          /* Giới hạn chiều rộng */
        }

        .action-buttons a {
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none !important;
        }


        /* Shared uniform style for ALL buttons */
        .btn-edit, .btn-delete, .btn-activate, .btn-deactivate, .btn-view-courses {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Ẩn text trên màn hình nhỏ, chỉ hiện icon */
        .action-buttons .btn-text {
            display: inline;
        }
        
        @media (max-width: 1400px) {
            .action-buttons .btn-text {
                display: none;
            }
            .action-buttons a {
                padding: 8px;
            }
        }

        /* EDIT (soft blue) */
        .btn-edit {
            background: #eef6ff;
            color: #0b63ce;
            border-color: #c9ddff;
        }
        .btn-edit:hover { background: #dcecff; }

        /* DELETE (soft red) */
        .btn-delete {
            background: #ffecec;
            color: #c82333;
            border-color: #f3b7b7;
        }
        .btn-delete:hover { background: #ffdede; }

        /* ACTIVATE (soft green) */
        .btn-activate {
            background: #d4f8df;
            color: #1e8e3e;
            border-color: #a8e8c1;
        }
        .btn-activate:hover { background: #bff3cf; }

        /* DEACTIVATE (soft orange) */
        .btn-deactivate {
            background: #ffe8d0;
            color: #d47a00;
            border-color: #f7c69b;
        }
        .btn-deactivate:hover { background: #fdd9b0; }

        /* VIEW COURSES (soft purple) */
        .btn-view-courses {
            background: #f3e8ff;
            color: #7c3aed;
            border-color: #ddd6fe;
            text-decoration: none;
        }
        .btn-view-courses:hover { 
            background: #e9d5ff;
            color: #6d28d9;
        }

        /* PAGINATION */
        .pagination-wrapper {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .pagination-btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s ease;
        }

        .pagination-btn:hover:not(.disabled) {
            background: #0056b3;
            color: white;
        }

        .pagination-btn.disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .pagination-info {
            font-weight: 600;
            color: #333;
        }

    </style>
</head>

<body>

<div class="admin-layout">
    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='users')}"></aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='User Management')}"></header>

        <!-- USER MANAGEMENT CONTENT -->
        <main class="dashboard-content" style="padding: 30px;">

            <form th:action="@{/admin/users}" method="get" style="margin-bottom: 20px;">
                <input type="text" name="keyword" placeholder="Search by name or username"
                       th:value="${keyword}"
                       style="padding:8px; width:250px; border-radius:6px; border:1px solid #ccc;">
                <button type="submit"
                        style="padding:8px 12px; background:#007bff; color:white; border:none; border-radius:6px;">
                    <i class="fas fa-search"></i> Search
                </button>
            </form>

            <table class="user-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Full Name</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.first_name + ' ' + user.last_name}"></td>

                    <td>
                        <span th:each="role : ${user.roles}"
                              th:text="${role.name}" th:append="' '"></span>
                    </td>

                    <td>
                        <span th:text="${user.active} ? 'Active' : 'Inactive'"
                              th:classappend="${user.active} ? 'status-active' : 'status-inactive'"></span>
                    </td>

                    <td>
                        <div class="action-buttons">
                            <a th:href="@{/admin/users/{id}/courses(id=${user.id})}"
                               class="btn btn-view-courses"
                               title="View Courses">
                                <i class="fas fa-graduation-cap"></i>
                                <span class="btn-text">Courses</span>
                            </a>

                            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
                               class="btn btn-edit"
                               title="Edit User">
                                <i class="fas fa-edit"></i>
                                <span class="btn-text">Edit</span>
                            </a>

                            <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                               class="btn btn-delete"
                               title="Delete User"
                               onclick="return confirm('Are you sure you want to delete this user?');">
                                <i class="fas fa-trash"></i>
                                <span class="btn-text">Delete</span>
                            </a>

                            <a th:href="@{/admin/users/toggle-status/{id}(id=${user.id})}"
                               class="btn btn-toggle"
                               th:classappend="${user.active} ? ' btn-deactivate' : ' btn-activate'"
                               th:title="${user.active} ? 'Deactivate User' : 'Activate User'"
                               onclick="return confirm('Are you sure you want to change user status?');">
                                <i class="fas" th:classappend="${user.active} ? 'fa-toggle-off' : 'fa-toggle-on'"></i>
                                <span class="btn-text" th:text="${user.active} ? 'Deactivate' : 'Activate'"></span>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination-wrapper" th:if="${totalPages != null and totalPages > 1}">
                <a class="pagination-btn"
                   th:classappend="${!hasPrevious} ? ' disabled'"
                   th:href="${hasPrevious} ? @{/admin/users(page=${currentPage - 1}, keyword=${keyword})} : '#'">
                    <i class="fas fa-chevron-left"></i>
                    Previous
                </a>
                <span class="pagination-info">
                    Page <span th:text="${currentPage}">1</span>
                    / <span th:text="${totalPages}">1</span>
                </span>
                <a class="pagination-btn"
                   th:classappend="${!hasNext} ? ' disabled'"
                   th:href="${hasNext} ? @{/admin/users(page=${currentPage + 1}, keyword=${keyword})} : '#'">
                    Next
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>

        </main>

    </div>
</div>

<!-- Include nav script -->
<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>

</body>
</html>
