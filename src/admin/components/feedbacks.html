<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Feedbacks | Admin LCMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">

    <!-- Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .admin-layout {
            min-height: 100vh;
        }

        aside {
            width: 250px; /* sidebar width */
            flex-shrink: 0; /* don't shrink */
            position: fixed; /* keep sidebar fixed on the left */
            top: 0;
            left: 0;
            bottom: 0;
            background-color: #fff; /* or your desired color */
            z-index: 1000; /* always on top of the background */
        }

        .flex-grow-1 {
            margin-left: 250px; /* 250px away from the sidebar */
        }
    </style>
</head>
<body class="bg-light">

<div class="admin-layout d-flex">

    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='feedback')}"></aside>

    <!-- Right content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='Feedbacks')}"></header>

        <!-- Main container -->
        <div class="container py-5">

            <!-- Search + Filter -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <input id="searchInput" type="text" class="form-control" placeholder="Search by user or course...">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <select id="ratingFilter" class="form-select">
                        <option value="all">All Ratings</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                    <select id="dateSort" class="form-select">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                    </select>
                </div>
            </div>

            <!-- Table -->
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table id="feedbackTable" class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Course</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th>Created At</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>
                        <tbody id="feedbackTableBody">
                        <tr th:each="fb : ${feedbacks}">
                            <td th:text="${fb.feedbackId}"></td>
                            <td th:text="${fb.userName}"></td>
                            <td th:text="${fb.courseTitle}"></td>
                            <td th:attr="data-rating=${fb.rating}">
                                    <span th:each="i : ${#numbers.sequence(1,5)}">
                                        <svg class="me-1" width="20" height="20"
                                             th:classappend="${i <= fb.rating} ? 'text-warning' : 'text-secondary'"
                                             fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.561-.955L10 0l2.95 5.955 6.561.955-4.756 4.635 1.123 6.545z"/>
                                        </svg>
                                    </span>
                            </td>
                            <td th:text="${fb.comment}"></td>
                            <td th:attr="data-date=${#temporals.format(fb.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                                th:text="${#temporals.format(fb.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td class="text-center">
                                <button class="btn btn-link text-danger p-0" onclick="confirmDelete([[${fb.feedbackId}]])">
                                    <i data-feather="trash-2"></i>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div> <!-- container -->

        <!-- Delete Modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Delete Feedback</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        Are you sure you want to delete this feedback?
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <form id="deleteForm" method="post" th:action="@{/admin/feedbacks/delete/__id__}">
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div> <!-- flex-grow-1 -->

</div> <!-- admin-layout -->

<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>

<script>
    feather.replace();

    const searchInput = document.getElementById('searchInput');
    const ratingFilter = document.getElementById('ratingFilter');
    const dateSort = document.getElementById('dateSort');
    const tableBody = document.getElementById('feedbackTableBody');
    const rows = Array.from(tableBody.rows);

    function filterAndSort() {
        const filterText = searchInput.value.toLowerCase();
        const filterRating = ratingFilter.value;
        const sortOrder = dateSort.value;

        let filteredRows = rows.filter(row => {
            const user = row.cells[1].textContent.toLowerCase();
            const course = row.cells[2].textContent.toLowerCase();
            const rating = row.cells[3].getAttribute('data-rating');
            return (user.includes(filterText) || course.includes(filterText)) &&
                (filterRating === 'all' || rating === filterRating);
        });

        filteredRows.sort((a,b) => {
            const dateA = new Date(a.cells[5].getAttribute('data-date'));
            const dateB = new Date(b.cells[5].getAttribute('data-date'));
            return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
        });

        tableBody.innerHTML = '';
        filteredRows.forEach(row => tableBody.appendChild(row));
    }

    searchInput.addEventListener('input', filterAndSort);
    ratingFilter.addEventListener('change', filterAndSort);
    dateSort.addEventListener('change', filterAndSort);

    function confirmDelete(id) {
        const form = document.getElementById('deleteForm');
        form.action = '/admin/feedbacks/delete/' + id;
        const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
        modal.show();
    }
</script>

</body>
</html>
