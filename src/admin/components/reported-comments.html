<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Reports | Admin LCMS</title>

    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .topbar-right { position: relative; }
        
        /* Improved table styling */
        .reported-comments-table {
            margin: 0;
        }
        .reported-comments-table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            padding: 1rem;
            font-weight: 600;
            color: #495057;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .reported-comments-table tbody td {
            padding: 1.25rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #e9ecef;
        }
        .reported-comments-table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .reported-comments-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Content column with better spacing */
        .comment-content-cell {
            max-width: 350px;
            word-wrap: break-word;
            line-height: 1.6;
        }
        
        /* Action buttons styling */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-buttons form {
            margin: 0;
        }
        .action-buttons .btn {
            min-width: 100px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .action-buttons .btn-success {
            background-color: #28a745;
            border-color: #28a745;
        }
        .action-buttons .btn-success:hover {
            background-color: #218838;
            border-color: #1e7e34;
            transform: translateY(-1px);
        }
        .action-buttons .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .action-buttons .btn-danger:hover {
            background-color: #c82333;
            border-color: #bd2130;
            transform: translateY(-1px);
        }
        
        /* Blog link styling */
        .blog-link {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .blog-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
        
        /* Card spacing */
        .card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* Alert Messages Styling */
        .alert-messages-container {
            margin-bottom: 2rem;
        }
        .alert {
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: none;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        /* Empty state */
        .empty-state-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .empty-state {
            padding: 5rem 3rem;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .empty-state .card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .empty-state i {
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }
        .empty-state h4 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.75rem;
        }
        .empty-state p {
            font-size: 1rem;
            color: #6c757d;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='reported-comments')}"></aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='Reported Comments')}"></header>

        <!-- Reported Comments Content -->
        <main class="dashboard-content" style="padding: 30px;">

            <!-- Header -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h1 class="fs-2 fw-bold text-dark mb-3 mb-md-0">
                    <i class="fa-solid fa-flag text-danger me-2"></i>Reported Comments
                </h1>
            </div>

            <!-- Alert Messages -->
            <div class="alert-messages-container">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-exclamation-circle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>

            <!-- Table -->
            <div class="card shadow-sm" th:if="${reportedComments != null && !#lists.isEmpty(reportedComments)}">
                <div class="table-responsive">
                    <table class="table reported-comments-table align-middle mb-0">
                        <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th style="min-width: 200px;">Blog</th>
                            <th style="min-width: 120px;">Commenter</th>
                            <th style="min-width: 180px;">Email</th>
                            <th style="min-width: 250px;">Content</th>
                            <th style="min-width: 140px;">Reported At</th>
                            <th class="text-center" style="min-width: 220px;">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="comment : ${reportedComments}">
                            <td th:text="${comment.id}"></td>
                            <td>
                                <a th:href="@{'/blog/' + ${comment.blog.slug}}" target="_blank" 
                                   class="blog-link">
                                    <i class="fa-solid fa-external-link-alt me-1"></i>
                                    <span th:text="${comment.blog.title}"></span>
                                </a>
                            </td>
                            <td>
                                <strong th:text="${comment.studentName}"></strong>
                            </td>
                            <td>
                                <span th:text="${comment.studentEmail}" class="text-muted"></span>
                            </td>
                            <td class="comment-content-cell">
                                <span th:text="${comment.content}"></span>
                            </td>
                            <td>
                                <span th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}" class="text-muted"></span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <form th:action="@{'/admin/comments/' + ${comment.id} + '/approve'}" 
                                          method="post">
                                        <button type="submit" class="btn btn-success" 
                                                onclick="return confirm('Are you sure you want to approve this comment?')">
                                            <i class="fa-solid fa-check me-1"></i> Approve
                                        </button>
                                    </form>
                                    <form th:action="@{'/admin/comments/' + ${comment.id} + '/reject'}" 
                                          method="post">
                                        <button type="submit" class="btn btn-danger" 
                                                onclick="return confirm('Are you sure you want to reject this comment?')">
                                            <i class="fa-solid fa-times me-1"></i> Reject
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Empty State -->
            <div class="empty-state-container" th:if="${reportedComments == null || #lists.isEmpty(reportedComments)}">
                <div class="card shadow-sm empty-state">
                    <div class="card-body">
                        <i class="fa-solid fa-check-circle text-success" style="font-size: 5rem;"></i>
                        <h4>No comments reported</h4>
                        <p>All comments are working normally.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>
</body>
</html>
