<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages | Admin LCMS</title>

    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>.topbar-right { position: relative; }</style>
</head>

<body>

<div class="admin-layout d-flex">

    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='contact')}"></aside>

    <div class="main-content flex-grow-1">

        <!-- Top Bar -->
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='Contact Messages')}"></header>

        <!-- CONTENT -->
        <main class="dashboard-content p-4">

            <!-- Header + Breadcrumb -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h1 class="fw-bold text-dark mb-3 mb-md-0" style="font-size: 2rem;">All Contact Messages</h1>

                <nav class="text-secondary small">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item">
                            <a th:href="@{/admin/dashboard}" class="text-primary fw-semibold">Dashboard</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">Contact Messages</li>
                    </ol>
                </nav>
            </div>

            <!-- Search + Filter -->
            <div class="d-flex flex-column flex-md-row gap-3 mb-4">
                <input id="searchInput" type="text"
                       class="form-control shadow-sm"
                       placeholder="Search by name, email, or subject..."
                       style="max-width: 350px;">

                <select id="repliedFilter" class="form-select shadow-sm" style="max-width: 220px;">
                    <option value="all">All</option>
                    <option value="yes">Replied</option>
                    <option value="no">Not Replied</option>
                </select>
            </div>

            <!-- Table Card -->
            <div class="card shadow-lg rounded-4">
                <div class="table-responsive">
                    <table id="messageTable" class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Subject</th>
                            <th>Message</th>
                            <th>Replied</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>

                        <tbody id="messageTableBody">
                        <tr th:each="msg : ${messages}">
                            <td th:text="${msg.id}"></td>
                            <td th:text="${msg.name}"></td>
                            <td class="text-primary fw-semibold" th:text="${msg.email}"></td>
                            <td th:text="${msg.subject}"></td>
                            <td class="text-break" style="max-width: 280px;" th:text="${msg.message}"></td>

                            <td>
                                <span th:if="${msg.replied}" class="text-success fw-semibold">Yes</span>
                                <span th:if="${!msg.replied}" class="text-danger fw-semibold">No</span>
                            </td>

                            <td class="text-center">
                                <a th:href="@{'/admin/contact/reply/' + ${msg.id}}"
                                   th:if="${!msg.replied}"
                                   class="btn btn-primary btn-sm px-3">
                                    Reply
                                </a>

                                <span th:if="${msg.replied}" class="text-muted fst-italic">Replied</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Nav script -->
<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const searchInput = document.getElementById('searchInput');
    const repliedFilter = document.getElementById('repliedFilter');
    const tableBody = document.getElementById('messageTableBody');
    const rows = Array.from(tableBody.rows);

    function filterTable() {
        const filterText = searchInput.value.toLowerCase();
        const repliedValue = repliedFilter.value;

        tableBody.innerHTML = '';

        rows.filter(row => {
            const name = row.cells[1].textContent.toLowerCase();
            const email = row.cells[2].textContent.toLowerCase();
            const subject = row.cells[3].textContent.toLowerCase();
            const repliedText = row.cells[5].textContent.trim().toLowerCase();

            const matchesSearch =
                name.includes(filterText) ||
                email.includes(filterText) ||
                subject.includes(filterText);

            const matchesReplied =
                (repliedValue === 'all') ||
                (repliedValue === 'yes' && repliedText === 'yes') ||
                (repliedValue === 'no' && repliedText === 'no');

            return matchesSearch && matchesReplied;
        }).forEach(row => tableBody.appendChild(row));
    }

    searchInput.addEventListener('input', filterTable);
    repliedFilter.addEventListener('change', filterTable);

    feather.replace();
</script>

</body>
</html>
