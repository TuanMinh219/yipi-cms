<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Courses | Admin LCMS</title>

    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            margin: 0;
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
        }

        .btn-back {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-back:hover {
            background: #5a6268;
            color: white;
            transform: translateX(-3px);
        }

        .user-card {
            background: white;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #007bff;
        }

        .user-name {
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-email {
            font-size: 15px;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .badge-count {
            background: linear-gradient(135deg, #f36e3a 0%, #f36e3a 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .courses-section {
            background: white;
            border-radius: 12px;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .courses-table {
            width: 100%;
            border-collapse: collapse;
        }

        .courses-table thead {
            background: linear-gradient(135deg, #f36e3a 0%, #f36e3a 100%);
        }

        .courses-table th {
            text-align: left;
            padding: 16px 20px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .courses-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .courses-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .course-title {
            font-weight: 600;
            color: #2c3e50;
            font-size: 15px;
        }

        .course-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f36e3a 0%, #f36e3a 100%);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .price-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .price-free {
            background: #d4edda;
            color: #155724;
        }

        .price-paid {
            background: #fff3cd;
            color: #856404;
        }

        .status-enrolled {
            color: #28a745;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-refunded {
            color: #dc3545;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-refund {
            background: #fff3cd;
            color: #856404;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            border: 1px solid #ffc107;
        }

        .btn-refund:hover {
            background: #ffc107;
            color: #fff;
            transform: translateY(-2px);
        }

        .refund-info {
            font-size: 12px;
            color: #6c757d;
            font-style: italic;
            margin-top: 4px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
        }

        .empty-state i {
            font-size: 72px;
            color: #e0e0e0;
        }

        .pagination-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 30px 20px;
            background: white;
        }

        .pagination-btn {
            background: linear-gradient(135deg, #f36e3a 0%, #f36e3a 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .pagination-btn.disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="admin-layout">
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='users')}"></aside>

    <div class="main-content">
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='User Courses')}"></header>

        <main class="dashboard-content" style="padding:30px;">

            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-graduation-cap"></i> Enrolled Courses
                </h1>
                <a th:href="@{/admin/users}" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Users
                </a>
            </div>

            <div class="user-card">
                <div class="user-name">
                    <i class="fas fa-user-circle" style="color:#007bff;"></i>
                    <span th:text="${user.first_name + ' ' + user.last_name}"></span>
                </div>

                <div class="user-email">
                    <i class="fas fa-envelope"></i>
                    <span th:text="${user.email}"></span>
                </div>

                <span class="badge-count"
                      th:text="${totalEnrollments != null ? totalEnrollments : #lists.size(enrollments)} + ' Course(s)'">
                </span>
            </div>

            <div th:if="${enrollments != null and !enrollments.isEmpty()}" class="courses-section">

                <table class="courses-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Course Title</th>
                        <th>Price</th>
                        <th>Enrolled Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="enrollment, iter : ${enrollments}">

                        <td>
                            <span class="course-number"
                                  th:text="${(currentPage - 1) * 10 + iter.index + 1}"></span>
                        </td>

                        <td>
                            <div class="course-title" th:text="${enrollment.course.title}"></div>
                        </td>

                        <td>
                            <span th:if="${enrollment.course.price == 0}" class="price-badge price-free">Free</span>

                            <span th:if="${enrollment.course.price > 0}" class="price-badge price-paid">
                                <span th:text="${enrollment.course.price}">0</span> VND
                            </span>
                        </td>

                        <td th:text="${#temporals.format(enrollment.enrolledAt, 'dd MMM yyyy HH:mm')}"></td>

                        <!-- STATUS -->
                        <td>
                            <span th:if="${!enrollment.refunded}" class="status-enrolled">
                                <i class="fas fa-check-circle"></i> Active
                            </span>

                            <span th:if="${enrollment.refunded}" class="status-refunded">
                                <i class="fas fa-times-circle"></i> Refunded
                            </span>
                        </td>

                        <!-- ACTION -->
                        <td>

                            <!-- CASE 1 — Có thể refund -->
                            <a th:if="${enrollment.canRefund()}"
                               th:href="@{/admin/enrollments/{id}/refund(id=${enrollment.id})}"
                               class="btn-refund"
                               onclick="return confirm('Are you sure you want to refund this course?');">
                                <i class="fas fa-undo"></i> Refund
                            </a>

                            <!-- CASE 2 — Không thể refund -->
                            <span th:if="${!enrollment.canRefund() and !enrollment.refunded}"
                                  class="refund-info">
                                <span th:if="${enrollment.course.price > 0}">Refund period expired</span>
                                <span th:if="${enrollment.course.price == 0}">Free course</span>
                            </span>

                            <!-- CASE 3 — Đã refund -->
                            <div th:if="${enrollment.refunded}" class="refund-info" style="color:#dc3545;">
                                <i class="fas fa-undo"></i> Refunded<br>
                                Refunded on:
                                <span th:text="${#temporals.format(enrollment.refundedAt, 'dd MMM yyyy HH:mm')}"></span>
                            </div>

                        </td>

                    </tr>
                    </tbody>
                </table>

            </div>

            <div th:if="${enrollments == null or enrollments.isEmpty()}" class="courses-section">
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>No Courses Yet</h3>
                    <p>This user hasn't enrolled in any courses yet.</p>
                </div>
            </div>

        </main>
    </div>
</div>

<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>

</body>
</html>
