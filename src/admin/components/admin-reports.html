<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lesson Reports</title>

    <link rel="stylesheet" th:href="@{/css/admin/admin-dashboard.css}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .topbar-right { position: relative; }
        
        /* Table Improvements */
        #reportTable {
            font-size: 0.9rem;
        }
        
        #reportTable thead th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 0.75rem 0.5rem;
            border-bottom: 2px solid #dee2e6;
        }
        
        #reportTable tbody td {
            padding: 0.75rem 0.5rem;
            vertical-align: middle;
        }
        
        #reportTable tbody tr {
            transition: background-color 0.2s ease;
        }
        
        #reportTable tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        /* Column Widths - Flexible, no min-width to prevent horizontal scroll */
        #reportTable {
            width: 100%;
            table-layout: auto;
        }
        
        #reportTable th:nth-child(1),
        #reportTable td:nth-child(1) {
            width: 50px;
            text-align: center;
        }
        
        #reportTable th:nth-child(2),
        #reportTable td:nth-child(2) {
            width: 18%;
        }
        
        #reportTable th:nth-child(3),
        #reportTable td:nth-child(3) {
            width: 12%;
        }
        
        #reportTable th:nth-child(4),
        #reportTable td:nth-child(4) {
            width: 12%;
        }
        
        #reportTable th:nth-child(5),
        #reportTable td:nth-child(5) {
            width: 10%;
        }
        
        #reportTable th:nth-child(6),
        #reportTable td:nth-child(6) {
            width: 20%;
        }
        
        #reportTable th:nth-child(7),
        #reportTable td:nth-child(7) {
            width: 8%;
        }
        
        #reportTable th:nth-child(8),
        #reportTable td:nth-child(8) {
            width: 10%;
        }
        
        #reportTable th:nth-child(9),
        #reportTable td:nth-child(9) {
            width: 8%;
        }
        
        /* Text Truncation - Better wrapping */
        #reportTable td:nth-child(2) span {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            max-height: 2.8em;
        }
        
        #reportTable td:nth-child(3) span {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #reportTable td:nth-child(6) {
            max-width: 0;
        }
        
        #reportTable td:nth-child(6) .description-text {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.4;
            max-height: 4.2em;
        }
        
        /* Badge Improvements */
        #reportTable .badge {
            padding: 0.4em 0.6em;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        /* User Info */
        #reportTable td:nth-child(4) span {
            display: block;
            margin-bottom: 0.25rem;
        }
        
        #reportTable td:nth-child(4) small {
            font-size: 0.75rem;
            display: block;
            margin-top: 0.25rem;
        }
        
        /* Date Formatting */
        #reportTable td:nth-child(8) {
            font-size: 0.85rem;
        }
        
        #reportTable td:nth-child(8) small {
            display: block;
            line-height: 1.3;
        }
        
        /* Ensure table fits container */
        .table-responsive {
            overflow-x: visible;
        }
        
        @media (max-width: 1400px) {
            #reportTable {
                font-size: 0.85rem;
            }
            
            #reportTable thead th,
            #reportTable tbody td {
                padding: 0.6rem 0.4rem;
            }
        }
        
        /* Card Header */
        .card {
            border: none;
        }
        
        .card-body {
            padding: 0;
        }
        
        /* Empty State */
        #reportTable tbody tr td[colspan] {
            padding: 3rem 1rem;
        }
        
        /* Pagination Styles */
        .pagination-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 30px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .pagination-btn {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .pagination-btn:hover:not(.disabled) {
            background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }

        .pagination-btn.disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .pagination-info {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="admin-layout d-flex">

    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin/_admin-nav :: sidebar(currentPage='reports')}"></aside>

    <div class="main-content flex-grow-1">

        <!-- Top Bar -->
        <header th:replace="~{fragments/admin/_admin-nav :: topbar(pageTitle='Lesson Reports')}"></header>

        <!-- CONTENT -->
        <main class="dashboard-content p-4">

            <!-- Header + Breadcrumb -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                <h1 class="fw-bold text-dark mb-3 mb-md-0" style="font-size: 2rem;">
                    <i class="fas fa-flag text-danger me-2"></i>Lesson Reports
                </h1>
            </div>

            <!-- Search + Filter -->
            <div class="d-flex flex-column flex-md-row gap-3 mb-4">
                <input id="searchInput" type="text"
                       class="form-control shadow-sm"
                       placeholder="Search by lesson, user, or issue type..."
                       style="max-width: 350px;">

                <select id="statusFilter" class="form-select shadow-sm" style="max-width: 220px;">
                    <option value="all">All Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="REVIEWED">Reviewed</option>
                    <option value="RESOLVED">Resolved</option>
                </select>
            </div>

            <!-- Table Card -->
            <div class="card shadow-lg rounded-4">
                <div class="table-responsive">
                    <table id="reportTable" class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Lesson</th>
                            <th>Course</th>
                            <th>User</th>
                            <th>Issue Type</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>

                        <tbody id="reportTableBody">
                        <tr th:each="report : ${reports}">
                            <td class="text-center fw-bold text-muted" th:text="${report.id}"></td>
                            <td>
                                <span class="fw-semibold text-dark" th:text="${report.lesson.title}"></span>
                            </td>
                            <td>
                                <span class="text-primary fw-medium" th:text="${report.lesson.course.title}"></span>
                            </td>
                            <td>
                                <span class="fw-medium" th:text="${report.user.first_name + ' ' + report.user.last_name}"></span>
                                <small class="text-muted d-block mt-1" th:text="${report.user.email}"></small>
                            </td>
                            <td>
                                <span class="badge bg-info text-white" th:text="${report.issueType}"></span>
                            </td>
                            <td>
                                <span class="description-text" th:text="${report.description}"></span>
                            </td>
                            <td>
                                <span th:if="${report.status == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                                <span th:if="${report.status == 'REVIEWED'}" class="badge bg-info text-white">Reviewed</span>
                                <span th:if="${report.status == 'RESOLVED'}" class="badge bg-success text-white">Resolved</span>
                            </td>
                            <td>
                                <small class="text-muted" th:text="${#temporals.format(report.createdAt, 'MMM dd, yyyy')}"></small>
                                <br>
                                <small class="text-muted" th:text="${#temporals.format(report.createdAt, 'HH:mm')}"></small>
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-sm btn-primary px-3" 
                                        data-bs-toggle="modal" 
                                        data-bs-target="#viewReportModal"
                                        th:data-report-id="${report.id}"
                                        th:data-lesson-title="${report.lesson.title}"
                                        th:data-course-title="${report.lesson.course.title}"
                                        th:data-user-name="${report.user.first_name + ' ' + report.user.last_name}"
                                        th:data-user-email="${report.user.email}"
                                        th:data-issue-type="${report.issueType}"
                                        th:data-description="${report.description}"
                                        th:data-status="${report.status}"
                                        th:data-admin-notes="${report.adminNotes != null ? report.adminNotes : ''}"
                                        onclick="viewReportFromButton(this)">
                                    <i class="fas fa-eye me-1"></i>View
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reports)}">
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="fas fa-inbox fa-2x mb-2"></i>
                                <p class="mb-0">No reports found</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination-wrapper mt-4" th:if="${totalPages != null and totalPages > 1}">
                <a class="pagination-btn"
                   th:classappend="${!hasPrevious} ? ' disabled'"
                   th:href="${hasPrevious} ? @{/admin/reports(page=${currentPage - 1})} : '#'">
                    <i class="fas fa-chevron-left"></i>
                    Previous
                </a>
                <span class="pagination-info">
                    Page <span th:text="${currentPage}">1</span>
                    / <span th:text="${totalPages}">1</span>
                </span>
                <a class="pagination-btn"
                   th:classappend="${!hasNext} ? ' disabled'"
                   th:href="${hasNext} ? @{/admin/reports(page=${currentPage + 1})} : '#'">
                    Next
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </main>
    </div>
</div>

<!-- View Report Modal -->
<div class="modal fade" id="viewReportModal" tabindex="-1" aria-labelledby="viewReportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="viewReportModalLabel">Report Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="updateReportForm">
                    <input type="hidden" id="reportId" name="reportId">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Lesson:</label>
                            <p id="modalLesson" class="mb-0"></p>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Course:</label>
                            <p id="modalCourse" class="mb-0"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">User:</label>
                            <p id="modalUser" class="mb-0"></p>
                            <small id="modalUserEmail" class="text-muted"></small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Issue Type:</label>
                            <p id="modalIssueType" class="mb-0"></p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Description:</label>
                        <p id="modalDescription" class="mb-0 p-3 bg-light rounded"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Status:</label>
                        <select class="form-select" id="modalStatus" name="status">
                            <option value="PENDING">Pending</option>
                            <option value="REVIEWED">Reviewed</option>
                            <option value="RESOLVED">Resolved</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Admin Notes:</label>
                        <textarea class="form-control" id="modalAdminNotes" name="adminNotes" rows="3" placeholder="Add notes about this report..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="updateReport()">Update Report</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Navigation Scripts (Sidebar Toggle, Dropdowns) -->
<script th:replace="~{fragments/admin/_admin-nav :: nav-script}"></script>

<script>
    // View report function (from data attributes)
    function viewReportFromButton(button) {
        document.getElementById('reportId').value = button.getAttribute('data-report-id');
        document.getElementById('modalLesson').textContent = button.getAttribute('data-lesson-title');
        document.getElementById('modalCourse').textContent = button.getAttribute('data-course-title');
        document.getElementById('modalUser').textContent = button.getAttribute('data-user-name');
        document.getElementById('modalUserEmail').textContent = button.getAttribute('data-user-email');
        document.getElementById('modalIssueType').textContent = button.getAttribute('data-issue-type');
        document.getElementById('modalDescription').textContent = button.getAttribute('data-description');
        document.getElementById('modalStatus').value = button.getAttribute('data-status');
        document.getElementById('modalAdminNotes').value = button.getAttribute('data-admin-notes') || '';
    }

    // Update report function
    function updateReport() {
        const reportId = document.getElementById('reportId').value;
        const status = document.getElementById('modalStatus').value;
        const adminNotes = document.getElementById('modalAdminNotes').value;

        const formData = new URLSearchParams();
        formData.append('reportId', reportId);
        formData.append('status', status);
        formData.append('adminNotes', adminNotes);

        fetch('/admin/reports/update', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
        .then(response => {
            if (response.ok) {
                location.reload();
            } else {
                alert('Failed to update report');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred');
        });
    }

    // Search and filter functionality
    document.getElementById('searchInput').addEventListener('input', filterTable);
    document.getElementById('statusFilter').addEventListener('change', filterTable);

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#reportTableBody tr');

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            const statusCell = row.querySelector('td:nth-child(7)');
            const status = statusCell ? statusCell.textContent.trim() : '';

            const matchesSearch = text.includes(searchText);
            const matchesStatus = statusFilter === 'all' || 
                                 (statusFilter === 'PENDING' && status.includes('Pending')) ||
                                 (statusFilter === 'REVIEWED' && status.includes('Reviewed')) ||
                                 (statusFilter === 'RESOLVED' && status.includes('Resolved'));

            row.style.display = (matchesSearch && matchesStatus) ? '' : 'none';
        });
    }
</script>

</body>
</html>
