<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>
        // This inline script prevents FOUC by applying the theme before rendering.
        // The full theme logic and toggle button are in theme-switcher.js
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (savedTheme === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz | LCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
    <style>
        :root {
            --primary-orange: #FF9900;
            --primary-dark: #E68A00;
            --background: #f8f9fa;
            --white: #ffffff;
            --text-dark: #2d3748;
            --text-light: #718096;
            --border-light: #e2e8f0;
            --success: #10b981;
        }

        .dark-mode {
            --background: #1a202c;
            --white: #2d3748; /* Card background */
            --text-dark: #edf2f7;
            --text-light: #a0aec0;
            --border-light: #4a5568;
        }

        .dark-mode .answer-option {
            background-color: #252e3e; /* Slightly lighter than card background */
        }


        body {
            background: var(--background);
            min-height: 100vh;
            padding: 40px 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .quiz-header {
            background: var(--white);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .quiz-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .quiz-info {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--border-light);
        }

        .quiz-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 14px;
        }

        .quiz-info-item i {
            color: var(--primary-orange);
            font-size: 16px;
        }

        .question-card {
            background: var(--white);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .question-number {
            display: inline-block;
            background: var(--primary-orange);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .answer-option {
            background: var(--background-alt, #fafbfc);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .answer-option:hover {
            border-color: var(--primary-orange);
            background: var(--primary-orange-light, #fff5e6);
        }

        .answer-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-orange);
        }

        .answer-option.selected {
            border-color: var(--primary-orange);
            background: var(--primary-orange-light, #fff5e6);
        }

        .dark-mode .answer-option:hover, .dark-mode .answer-option.selected {
            --primary-orange-light: rgba(255, 153, 0, 0.1);
        }

        .answer-option label {
            flex: 1;
            cursor: pointer;
            margin: 0;
            font-size: 15px;
            color: var(--text-dark);
        }

        .quiz-actions {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            bottom: 20px;
        }

        .btn-primary {
            background: var(--primary-orange);
            border: none;
            color: white;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255,153,0,0.3);
        }

        .btn-secondary {
            background: var(--text-light);
            border: none;
            color: white;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: var(--text-dark);
        }

        .alert {
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .progress-indicator {
            background: var(--border-light);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .dark-mode .progress-indicator {
            background: #4a5568;
        }

        .progress-bar {
            background: var(--primary-orange);
            height: 100%;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .quiz-header h1 {
                font-size: 22px;
            }

            .question-card {
                padding: 24px;
            }

            .quiz-actions {
                position: static;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <!-- Quiz Header -->
    <div class="quiz-header">
        <h1>
            <i class="fas fa-clipboard-question"></i>
            <span th:text="${quiz.title}">Quiz Title</span>
        </h1>

        <div class="quiz-info">
            <div class="quiz-info-item">
                <i class="fas fa-book"></i>
                <span>Lesson: <strong th:text="${lesson.title}">Lesson Name</strong></span>
            </div>
            <div class="quiz-info-item">
                <i class="fas fa-question-circle"></i>
                <span>Questions: <strong th:text="${quiz.questions.size()}">5</strong></span>
            </div>
        </div>

        <!-- Progress Indicator -->
        <div class="progress-indicator mt-3">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <!-- Quiz Form -->
    <form th:action="@{/student/lessons/{lessonId}/quiz/submit(lessonId=${lesson.id})}"
          method="post"
          id="quizForm">
        <input type="hidden" name="attemptId" th:value="${attempt.attemptId}">

        <!-- Questions -->
        <div th:each="question, iterStat : ${quiz.questions}" class="question-card">
            <span class="question-number">
                Question <span th:text="${iterStat.index + 1}">1</span>
            </span>

            <div class="question-text" th:text="${question.questionText}">
                What is the capital of France?
            </div>

            <div class="answers">
                <div th:each="answer : ${question.answers}"
                     class="answer-option"
                     th:classappend="${answer.answerId == selectedAnswer} ? 'selected' : ''">
                    <input type="radio"
                           th:id="'answer_' + ${answer.answerId}"
                           th:name="'question_' + ${question.questionId}"
                           th:value="${answer.answerId}"
                           th:data-question-id="${question.questionId}"
                           th:data-answer-id="${answer.answerId}"
                           class="answer-radio">
                    <label th:for="'answer_' + ${answer.answerId}"
                           th:text="${answer.answerText}">
                        Answer text here
                    </label>
                </div>
            </div>
        </div>

        <!-- Submit Actions -->
        <div class="quiz-actions">
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3 text-center">
<!--                <a th:href="@{/student/lessons/{id}(id=${lesson.id})}"-->
<!--                   class="btn btn-secondary">-->
<!--                    <i class="fas fa-arrow-left"></i> Back to Lesson-->
<!--                </a>-->

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-check"></i> Submit Quiz
                </button>
            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const attemptId = document.querySelector('input[name="attemptId"]').value;
        const totalQuestions = document.querySelectorAll('.question-card').length;
        const progressBar = document.getElementById('progressBar');

        // Track answered questions
        let answeredQuestions = new Set();

        // Save answer on click (AJAX)
        document.querySelectorAll('.answer-radio').forEach(radio => {
            radio.addEventListener('change', function() {
                const questionId = this.dataset.questionId;
                const answerId = this.dataset.answerId;

                // Update UI
                const parentOption = this.closest('.answer-option');
                const allOptions = parentOption.parentElement.querySelectorAll('.answer-option');
                allOptions.forEach(opt => opt.classList.remove('selected'));
                parentOption.classList.add('selected');

                // Track answered question
                answeredQuestions.add(questionId);
                updateProgress();

                // Save to backend
                saveAnswer(attemptId, questionId, answerId);
            });
        });

        // Save answer function
        function saveAnswer(attemptId, questionId, answerId) {
            fetch('/student/lessons/quiz/save-answer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `attemptId=${attemptId}&questionId=${questionId}&answerId=${answerId}`
            })
            .then(response => response.text())
            .then(data => {
                if (data !== 'success') {
                    console.error('Error saving answer:', data);
                }
            })
            .catch(error => console.error('Error:', error));
        }

        // Update progress
        function updateProgress() {
            const progress = (answeredQuestions.size / totalQuestions) * 100;
            progressBar.style.width = progress + '%';
        }

        // Submit validation
        document.getElementById('quizForm').addEventListener('submit', function(e) {
            if (answeredQuestions.size < totalQuestions) {
                if (!confirm(`You have only answered ${answeredQuestions.size} out of ${totalQuestions} questions. Are you sure you want to submit?`)) {
                    e.preventDefault();
                }
            }
        });
    });
</script>
<script th:src="@{/js/theme-switcher.js}"></script>
</body>
</html>
