<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <script>
        // This inline script prevents FOUC by applying the theme before rendering.
        // The full theme logic and toggle button are in theme-switcher.js
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (savedTheme === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | LCMS</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/user/profile.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
    <style>
        /* Brighter, more distinct active state for the sidebar in light mode */
        .sidebar-nav a.active {
            background-color: #ff8c42 !important; /* Vibrant orange background */
            color: #ffffff !important; /* White text for high contrast */
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.4);
            transform: translateX(5px);
        }
    </style>

</head>

<body>

<!-- Header Fragment -->
<div th:replace="~{fragments/_header :: navbar}"></div>

<!-- === MAIN SECTION === -->
<div class="main-section">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img th:src="${user.avatar != null and !#strings.isEmpty(user.avatar)} ? @{${user.avatar}} : @{/img/thumbnaildefault.jpg}"
                 alt="Avatar" class="avatar mb-2">
            <h2 class="user-name" th:text="${user.first_name} + ' ' + ${user.last_name}">User Name</h2>
            <p class="user-email" th:text="${user.email}">email@example.com</p>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="active" id="showProfile">
                <i class="fas fa-user"></i> Profile
            </a>
            <a href="#" id="showChangePassword">
                <i class="fas fa-box"></i> Change Password
            </a>
            <a href="/logout">
                <i class="fas fa-right-from-bracket"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div id="profileInfoSection"
             th:classappend="${passwordSuccess != null or passwordMessage != null} ? ' d-none' : ''">

            <h1 class="main-title text-center mb-4">
                Profile Information
            </h1>



            <!-- Form 3x2 -->
            <form action="/profile/save" method="post" class="profile-form" enctype="multipart/form-data" style="width: 750px; height: 650px;"
                  th:object="${profileForm}">


                <!-- Avatar -->
                <div class="d-flex flex-column align-items-center mb-4" style="grid-column: span 2;">
                    <div class="position-relative">
                        <img id="avatarPreview"
                             th:src="${user.avatar != null and !#strings.isEmpty(user.avatar)} ? ${user.avatar} : @{/img/thumbnaildefault.jpg}"
                             alt="Avatar" class="avatar">

                        <input type="file" id="avatarInput" name="avatarFile" accept="image/*" class="d-none">
                        <button type="button" onclick="document.getElementById('avatarInput').click()"
                                class="btn-save position-absolute bottom-0 end-0 p-2">
                            <i class="fa-solid fa-camera"></i>
                        </button>
                    </div>
                </div>

                <!-- Hàng 1: First Name | Last Name -->
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-control"
                           th:field="*{first_name}"
                           th:classappend="${#fields.hasErrors('first_name')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('first_name')}"
                         th:errors="*{first_name}"></div>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-control"
                           th:field="*{last_name}"
                           th:classappend="${#fields.hasErrors('last_name')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('last_name')}"
                         th:errors="*{last_name}"></div>
                </div>

                <!-- Hàng 2: Email | Phone -->
                <div class="form-group">
                    <label for="email" class="d-flex justify-content-between align-items-center">
                        <span>Email</span>
                        <span th:if="${!user.is_verified}" class="text-danger fw-bold">
                    <i class="fas fa-times-circle"></i> NOT VERIFIED
                </span>
                        <span th:if="${user.is_verified}" class="text-success fw-bold">
                    <i class="fas fa-check-circle"></i> VERIFIED
                </span>
                    </label>
                    <input type="email" name="email" id="email" class="form-control" th:value="${user.email}" readonly>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" class="form-control"
                           th:field="*{phone}"
                           th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}"></div>
                </div>

                <!-- Hàng 3: Gender | Birthdate -->
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" class="form-select" th:field="*{gender}">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="birthdate">Birthdate</label>
                    <input type="date" id="birthdate" class="form-control"
                           th:field="*{birthdate}"
                           th:classappend="${#fields.hasErrors('birthdate')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('birthdate')}"
                         th:errors="*{birthdate}"></div>
                </div>

                <!-- Save Button -->
                <div class="form-actions">
                    <button type="submit" id="saveProfile" class="btn-save">
                        <i class="fas fa-save me-2"></i> Save Changes
                    </button>
                </div>

            </form>

            <!-- Send Verify Mail -->
            <div class="form-actions">
                <button id="verifyBtn" type="button"
                        th:if="${!user.is_verified}"
                        class="btn-save"
                        onclick="sendVerifyMail()">
                    <i class="fas fa-envelope me-2"></i> <span id="btnText">Send Verify Mail</span>
                </button>
            </div>

        </div>

        <!-- CHANGE PASSWORD SECTION -->
        <div id="changePasswordSection"
             th:classappend="${passwordSuccess != null or passwordMessage != null} ? '' : ' d-none'">

            <h2 class="text-center text-md-start mb-4" style="color:#c2410c;">Change Password</h2>

            <div th:if="${passwordSuccess != null or passwordMessage != null}"
                 th:class="${passwordSuccess} ? 'mb-3 p-3 alert alert-success' : 'mb-3 p-3 alert alert-danger'">
                <span th:text="${passwordMessage != null} ? ${passwordMessage} : (${passwordSuccess} ? 'Password changed successfully!' : 'Password change failed!')"></span>
            </div>

            <form action="/profile/change-password" method="post" class="profile-form">

                <!-- Current Password -->
                <div class="profile-card mb-3 p-3">
                    <label class="form-label">Current Password</label>
                    <div class="position-relative">
                        <input type="password" name="currentPassword" id="currentPassword" required class="form-control pe-5">
                        <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-secondary cursor-pointer"
                           onclick="togglePassword('currentPassword', this)"></i>
                    </div>
                </div>

                <!-- New Password -->
                <div class="profile-card mb-3 p-3">
                    <label class="form-label">New Password</label>
                    <div class="position-relative">
                        <input type="password" name="newPassword" id="newPassword" required class="form-control pe-5">
                        <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-secondary cursor-pointer"
                           onclick="togglePassword('newPassword', this)"></i>
                    </div>
                </div>

                <!-- Confirm New Password -->
                <div class="profile-card mb-3 p-3">
                    <label class="form-label">Confirm New Password</label>
                    <div class="position-relative">
                        <input type="password" name="confirmNewPassword" id="confirmNewPassword" required class="form-control pe-5">
                        <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-secondary cursor-pointer"
                           onclick="togglePassword('confirmNewPassword', this)"></i>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">
                        <i class="fa-solid fa-key me-2"></i> Change Password
                    </button>
                </div>

            </form>
        </div>

    </main>
</div>

<script>
    (function() {
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {

                // === Giới hạn dung lượng tối đa 4MB ===
                if (file.size > 4 * 1024 * 1024) {
                    alert("Ảnh quá lớn! Vui lòng chọn ảnh dưới 4MB.");
                    this.value = "";   // reset lại input
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e){
                    avatarPreview.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });


        window.togglePassword = function(inputId, icon){
            const input = document.getElementById(inputId);
            if(input.type === "password"){
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        document.addEventListener('DOMContentLoaded', function(){
            const showProfileBtn = document.getElementById('showProfile');
            const showChangePasswordBtn = document.getElementById('showChangePassword');
            const profileSection = document.getElementById('profileInfoSection');
            const passwordSection = document.getElementById('changePasswordSection');
            const hasPwdFeedback = document.querySelectorAll('#changePasswordSection .alert').length > 0;

            // If coming back from change-password attempt, show that tab
            if (hasPwdFeedback) {
                profileSection.classList.add('d-none');
                passwordSection.classList.remove('d-none');
                showChangePasswordBtn.classList.add('active');
                showProfileBtn.classList.remove('active');
            }

            showProfileBtn.addEventListener('click', function(e){
                e.preventDefault();
                profileSection.classList.remove('d-none');
                passwordSection.classList.add('d-none');
                showProfileBtn.classList.add('active');
                showChangePasswordBtn.classList.remove('active');
            });

            showChangePasswordBtn.addEventListener('click', function(e){
                e.preventDefault();
                profileSection.classList.add('d-none');
                passwordSection.classList.remove('d-none');
                showChangePasswordBtn.classList.add('active');
                showProfileBtn.classList.remove('active');
            });

            const changePwdForm = document.querySelector('#changePasswordSection form');
            if(changePwdForm){
                changePwdForm.addEventListener('submit', function(e){
                    const newPwd = this.newPassword.value;
                    const confirmPwd = this.confirmNewPassword.value;
                    if(newPwd !== confirmPwd){
                        e.preventDefault();
                        alert("New Password and Confirm Password do not match!");
                    }
                });
            }
        });
    })();

    function sendVerifyMail() {
        const btn = document.getElementById('verifyBtn');
        const btnText = document.getElementById('btnText');

        btnText.textContent = "Sending...";
        btn.disabled = true;

        fetch('/send-verify-mail', { method: 'POST' })
            .then(res => res.text())
            .then(msg => alert(msg))
            .catch(err => alert("Error sending verification email"))
            .finally(() => {
                btnText.textContent = "Send Verify Mail";
                btn.disabled = false;
            });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Footer Fragment -->
<div th:replace="~{fragments/_footer :: footer}"></div>

<script th:replace="~{fragments/_header :: header-script}"></script>
<script th:src="@{/js/theme-switcher.js}"></script>

</body>
</html>
