<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <script>
        // This inline script prevents FOUC by applying the theme before rendering.
        // The full theme logic and toggle button are in theme-switcher.js
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (savedTheme === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | LCMS</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/user/homepage.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}">

    <style>
      /* override chỉ cho page này */
      .contact-left-info i {
        color: #f97316 !important;
      }
      /* Add margin to map container to prevent header overlap */
      .map-container {
        margin-top: 80px; /* Matches header height */
      }
    </style>
  </head>

  <body class="bg-light">
    <!-- Header -->
    <div th:replace="~{fragments/_header :: navbar}"></div>

    <!-- GOOGLE MAP -->
    <div class="container-fluid px-0 map-container">
      <iframe
        src="https://www.google.com/maps?q=Hanoi,Vietnam&hl=vi&z=15&output=embed"
        class="w-100"
        style="height: 350px; border: 0"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>

    <!-- MAIN -->
    <div class="container my-5">
      <div class="row g-4">
        <!-- LEFT INFO -->
        <div class="col-md-4">
          <div class="bg-white shadow rounded p-4 contact-left-info">
            <h2 class="fw-bold text-warning mb-4">Information</h2>

            <div class="d-flex mb-4">
              <i class="fa-solid fa-phone fs-3 me-3"></i>
              <div>
                <p class="fw-semibold text-secondary mb-0">HOTLINE</p>
                <p class="text-dark mb-0">0926114927</p>
              </div>
            </div>

            <div class="d-flex mb-4">
              <i class="fa-solid fa-envelope fs-3 me-3"></i>
              <div>
                <p class="fw-semibold text-secondary mb-0">EMAIL</p>
                <p class="text-dark mb-0">hotronghien2k5@gmail.com</p>
              </div>
            </div>

            <div class="d-flex">
              <i class="fa-solid fa-location-dot fs-3 me-3"></i>
              <div>
                <p class="fw-semibold text-secondary mb-0">Customer Care</p>
                <p class="text-dark mb-0">0926114927</p>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT FORM -->
        <div class="col-md-8">
          <div class="bg-white p-4 shadow rounded">
            <h1 class="text-center fw-bold mb-4">
              <span class="text-warning">Contact</span> Us
            </h1>
            <div
              class="mx-auto mb-4"
              style="
                width: 80px;
                height: 4px;
                background: #f97316;
                border-radius: 4px;
              "
            ></div>

            <!-- SUCCESS -->
            <div
              th:if="${success}"
              id="successMessage"
              class="alert alert-success text-center fw-semibold"
              th:text="${success}"
            ></div>

            <!-- ERROR -->
            <div
              th:if="${error}"
              id="errorMessage"
              class="alert alert-danger text-center fw-semibold"
              th:text="${error}"
            ></div>

            <form th:action="@{/contact/send}" method="post">
              <div class="mb-3">
                <label class="form-label fw-semibold">Your Name</label>
                <input type="text" class="form-control" name="name" required />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Your Email</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Subject</label>
                <input
                  type="text"
                  class="form-control"
                  name="subject"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Message</label>
                <textarea
                  name="message"
                  rows="5"
                  class="form-control"
                  required
                ></textarea>
              </div>

              <div class="text-center">
                <button
                  type="submit"
                  class="btn text-white px-5 py-2"
                  style="background-color: #f97316"
                >
                  <i class="fa-solid fa-paper-plane me-2"></i>
                  Send
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/_footer :: footer}"></div>

    <!-- Script -->
    <script>
      setTimeout(() => {
        const success = document.getElementById("successMessage");
        const error = document.getElementById("errorMessage");
        [success, error].forEach((el) => {
          if (el) {
            el.style.opacity = "0";
            el.style.transition = "opacity .6s";
            setTimeout(() => el.remove(), 600);
          }
        });
      }, 3000);
    </script>

    <script th:src="@{/js/theme-switcher.js}"></script>
    <div th:replace="~{fragments/_header :: header-script}"></div>
  </body>
</html>
